<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Campus Schnitzeljagd</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Login Gate -->
  <div id="admin-login" class="card" style="max-width:360px;margin:3rem auto;padding:2rem;">
    <h2>🔐 Admin Login</h2>
    <form id="login-form">
      <label>Benutzer <input type="text" id="login-user" required autocomplete="username"></label>
      <label>Passwort <input type="password" id="login-pass" required autocomplete="current-password"></label>
      <button type="submit">Anmelden</button>
    </form>
    <p id="login-error" class="error"></p>
  </div>

  <!-- Admin Panel (hidden until login) -->
  <div id="admin-app" class="hidden">
  <header>
    <h1>⚙️ Admin Panel</h1>
    <nav>
      <button class="nav-btn active" data-view="admin-stations">Stationen</button>
      <button class="nav-btn" data-view="admin-teams">Teams</button>
      <button class="nav-btn" data-view="admin-scans">Antworten</button>
      <button class="nav-btn" data-view="admin-pending">Ausstehend</button>
      <button class="nav-btn" data-view="admin-log">Protokoll</button>
      <button class="nav-btn" data-view="admin-stats">Statistik</button>
      <a href="/" class="nav-btn">← Zurück</a>
      <button id="btn-logout" class="nav-btn" style="margin-left:auto;">🚪 Logout</button>
    </nav>
  </header>

  <main>
    <!-- Stations Management -->
    <section id="view-admin-stations" class="view active">
      <div class="card">
        <h2>Station erstellen</h2>
        <form id="create-station-form">
          <label>Name <input type="text" id="st-name" required></label>
          <label>Beschreibung <textarea id="st-desc"></textarea></label>
          <label>Punkte <input type="number" id="st-points" value="10" min="1"></label>
          <label>Reihenfolge <input type="number" id="st-order" value="0"></label>
          <label>Fragetyp
            <select id="st-qtype">
              <option value="qr_only">Nur QR-Code (kein Rätsel)</option>
              <option value="multiple_choice">Multiple Choice</option>
              <option value="text_answer">Text-Antwort</option>
              <option value="photo_upload">Foto-Upload</option>
            </select>
          </label>
          <div id="q-fields" class="hidden">
            <label>Frage <textarea id="st-qtext" rows="2"></textarea></label>
            <div id="mc-fields" class="hidden">
              <label>Antwortmöglichkeiten (eine pro Zeile)
                <textarea id="st-choices" rows="4" placeholder="Option A&#10;Option B&#10;Option C&#10;Option D"></textarea>
              </label>
              <label>Richtige Antwort (exakt wie oben)
                <input type="text" id="st-correct">
              </label>
            </div>
          </div>
          <button type="submit">Station erstellen</button>
        </form>
      </div>
      <div class="card">
        <h2>Alle Stationen</h2>
        <div id="admin-stations-list"></div>
      </div>
    </section>

    <!-- Teams Management -->
    <section id="view-admin-teams" class="view">
      <div class="card">
        <h2>Team erstellen</h2>
        <form id="create-team-form">
          <label>Teamname <input type="text" id="tm-name" required maxlength="50"></label>
          <button type="submit">Team erstellen</button>
        </form>
      </div>
      <div class="card">
        <h2>Teams</h2>
        <div id="admin-teams-list"></div>
        <button id="btn-reset" class="danger">Alle Teams & Scans zurücksetzen</button>
      </div>
    </section>

    <!-- Pending Approvals -->
    <section id="view-admin-pending" class="view">
      <div class="card">
        <h2>Ausstehende Bewertungen</h2>
        <div id="pending-list"></div>
      </div>
    </section>

    <!-- All Scans / Antworten -->
    <section id="view-admin-scans" class="view">
      <div class="card">
        <h2>Alle Antworten</h2>
        <label style="margin-bottom:0.5rem;display:block;">Filter Team:
          <input type="text" id="scan-filter-team" placeholder="Teamname..." style="width:200px">
        </label>
        <div id="admin-scans-list"></div>
      </div>
    </section>

    <!-- Admin Log -->
    <section id="view-admin-log" class="view">
      <div class="card">
        <h2>Admin-Protokoll</h2>
        <div id="admin-log-list"></div>
      </div>
    </section>

    <!-- Stats -->
    <section id="view-admin-stats" class="view">
      <div class="card">
        <h2>Statistik</h2>
        <div id="admin-stats"></div>
      </div>
    </section>
  </main>
  </div><!-- end admin-app -->

  <script src="/js/admin.js"></script>
</body>
</html>
